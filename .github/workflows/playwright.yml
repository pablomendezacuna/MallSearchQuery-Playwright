name: Playwright Tests
on:
  push:
    branches: [ main, master, stagebranch ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        # CACHE DE NPM: Evita descargar librerías si no han cambiado
        cache: 'npm'

    - name: Install dependencies
      run: npm ci # 'npm ci' es más rápido y limpio para entornos de CI

    - name: Get Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').dependencies['@playwright/test'].version)")" >> $GITHUB_ENV

    - name: Cache Playwright Browsers
      # CACHE DE NAVEGADORES: Si la versión de Playwright no cambia, no los descarga de nuevo
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      # Solo descarga si el cache no encontró nada
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test || true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: reporte-automatizacion-malls
        path: playwright-report/
        retention-days: 7